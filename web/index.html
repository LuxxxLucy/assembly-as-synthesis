<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>counterplan — CEGIS assembly planning</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
      }
    }
  </script>
</head>
<body>
  <header>
    <div class="header-row">
      <div>
        <h1>counterplan</h1>
        <p class="subtitle">The solver places each block. Unstable moves fall.</p>
      </div>
      <button id="btn-about" class="btn-about" title="About">about</button>
    </div>
  </header>

  <div id="about-modal" class="modal-backdrop" hidden>
    <div class="modal">
      <button id="btn-about-close" class="modal-close" title="Close">&times;</button>
      <article id="about-content" class="prose">Loading…</article>
    </div>
  </div>

  <main>
    <div id="viewer">
      <div id="structure-panel">
        <div id="three-canvas"></div>
        <div id="status-bar">
          <span id="status-text">Loading…</span>
        </div>
      </div>

      <aside id="info-panel">
        <div class="panel-section">
          <h3>Target structure</h3>
          <div id="preview-canvas"></div>
        </div>
        <div class="panel-section">
          <h2 id="round-label">Round —</h2>
          <div id="sequence-display" class="mono"></div>
        </div>
        <div class="panel-section">
          <h3>Learned constraints</h3>
          <div id="constraints-list" class="mono"></div>
        </div>
        <div class="panel-section">
          <h3>Verifier chain</h3>
          <div id="verifier-list" class="mono">
            <div><span class="swatch swatch-kinematic"></span>kinematic — fall path</div>
            <div><span class="swatch swatch-stability"></span>equilibrium — LP forces</div>
            <div><span class="swatch swatch-landing"></span>landing — settles at target</div>
          </div>
        </div>
        <div class="panel-section">
          <h3>Result</h3>
          <div id="result-display"></div>
        </div>
      </aside>
    </div>

    <div id="timeline">
      <div id="timeline-bar">
        <div id="timeline-progress"></div>
      </div>
      <div id="timeline-controls">
        <button id="btn-prev" title="Previous step">&larr;</button>
        <button id="btn-play" title="Play / pause">&#9654;</button>
        <button id="btn-next" title="Next step">&rarr;</button>
        <span id="frame-counter" class="mono">0 / 0</span>
      </div>
    </div>

    <div id="trace-selector">
      <label>Structure:</label>
      <select id="trace-select">
        <option value="pyramid_6">Pyramid 6 (feasible)</option>
        <option value="pyramid_10">Pyramid 10 (feasible, needs kinematic)</option>
        <option value="wall_4">Wall 4 (feasible)</option>
        <option value="post_and_lintel">Post &amp; Lintel (feasible)</option>
        <option value="arch_5">Arch 5 (infeasible — stability cycle)</option>
        <option value="arch_7">Arch 7 (infeasible)</option>
        <option value="gothic_arch">Gothic Arch (infeasible)</option>
        <option value="cantilever_5">Cantilever 5 (infeasible)</option>
        <option value="unstable_tower">Unstable Tower (feasible, topples in real physics)</option>
      </select>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
  <script type="module" src="app.js"></script>
  <script>
    const modal  = document.getElementById('about-modal');
    const openBtn = document.getElementById('btn-about');
    const closeBtn = document.getElementById('btn-about-close');
    const content = document.getElementById('about-content');
    let loaded = false;

    async function openAbout() {
      modal.hidden = false;
      if (!loaded) {
        try {
          const md = await fetch('introduction.md').then(r => r.text());
          content.innerHTML = window.marked ? marked.parse(md) : md;
          loaded = true;
        } catch (e) {
          content.textContent = `Failed to load introduction.md: ${e.message}`;
        }
      }
    }
    openBtn.addEventListener('click', openAbout);
    closeBtn.addEventListener('click', () => { modal.hidden = true; });
    modal.addEventListener('click', (e) => { if (e.target === modal) modal.hidden = true; });
    document.addEventListener('keydown', (e) => { if (e.key === 'Escape') modal.hidden = true; });
  </script>
</body>
</html>
